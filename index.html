<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <p>Tic Tac Toe Game</p>

    <form action="" id="name-form">
        <label for="player-1">Player 1 Name:</label>
        <input type="text" name="player-1" id="player-1">
        <label for="player-2">Player 2 Name:</label>
        <input type="text" name="player-2" id="player-2">
        <input type="submit" value="Submit">
    </form>
    <div id="game-header"></div>
    <div id="console">
        <!-- two divs with scores, reset button -->
         <div id="scoreboard">
            <div class="scoreboard-display" id="player-1-score">0</div>
            <div class="scoreboard-display" id="player-2-score">0</div>
         </div>
         <div id="reset-game">
            <button type="button" id="new-match">New Match</button>
         </div>
    </div>
    <div id="game-board">
    </div>
    <dialog id="new-game-dialog">
        <form method="dialog">
            <h3>Do you want to play again?</h3>
            <div class="buttons-container">
                <button type="submit">Sure!</button>
                <button type="button" id="closeModal">Nah...</button>
            </div>
        </form>
    </div>
</body>
</html>
